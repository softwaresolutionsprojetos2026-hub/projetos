name: PHP Composer

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Validate composer.json and composer.lock
      run: composer validate --strict

    - name: Cache Composer packages
      id: composer-cache
      uses: actions/cache@v3
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress --no-interaction

    - name: Run lint
      run: composer run lint

    - name: Run tests
      run: composer run test

    - name: Run PHPUnit suite
      run: |
        if [ -x vendor/bin/phpunit ]; then
          composer run test:phpunit
        else
          echo "PHPUnit not installed yet; fallback runner already executed."
        fi

  deploy_local_pull:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, Linux, X64, fred]
    needs: build

    steps:
    - name: Update local repository
      run: |
        git -C /srv/sistemas/projetos fetch --all --prune
        git -C /srv/sistemas/projetos pull --ff-only origin main
